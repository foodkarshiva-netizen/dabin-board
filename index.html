<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#2563eb">
<title>다빈 보드</title>
<style>
:root{--b:#2563eb;--b2:#1d4ed8;--bl:#e8f0fe;--ink:#1f2933;--mut:#7a8794;--line:#e7ecef;--bg:#f4f6fb;--card:#fff;--amber:#c98a18;--ok:#1f9d55;--goal:#0d8a5f}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#e6eaf3;color:var(--ink);font-size:15px;line-height:1.5}
.app{max-width:480px;margin:0 auto;height:100vh;height:100dvh;background:var(--bg);position:relative;display:flex;flex-direction:column;box-shadow:0 0 30px rgba(0,0,0,.08)}
header{background:linear-gradient(120deg,#2563eb,#3b82f6);color:#fff;padding:13px 18px;flex:0 0 auto;display:flex;justify-content:space-between;align-items:center}
header h1{margin:0;font-size:19px;font-weight:800;letter-spacing:-.5px}
header .who{font-size:11px;opacity:.92;cursor:pointer}
main{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}
.deskhead{display:none}
.pagewrap{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;padding:14px 14px 84px}
.page{display:none}.page.on{display:block}
#p-talk.on{display:flex;flex-direction:column;flex:1;min-height:0}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
.muted{color:var(--mut)}.small{font-size:12px}
h2.t{font-size:18px;margin:2px 2px 12px;font-weight:800}
.btn{border:none;border-radius:10px;padding:9px 14px;font-size:14px;font-weight:700;cursor:pointer}
.btn.p{background:var(--b);color:#fff}.btn.o{background:#fff;border:1px solid var(--line);color:#444}
.btn.sm{padding:6px 12px;font-size:13px;border-radius:999px}
input,textarea,select{font-family:inherit;font-size:14px;border:1px solid var(--line);border-radius:10px;padding:10px;width:100%;background:#fff;color:var(--ink)}
textarea{resize:vertical}
label.fl{display:block;font-size:12px;color:var(--mut);font-weight:700;margin:8px 2px 4px}
.pill{display:inline-block;background:var(--bl);color:var(--b2);font-size:11px;font-weight:800;padding:2px 8px;border-radius:999px}
nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid var(--line);display:flex;z-index:30;padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;background:none;border:none;padding:7px 0 8px;color:#9aa6ae;font-size:10px;font-weight:700;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
nav button .ic{font-size:16px;line-height:1}
nav button.on{color:var(--b)}
.rrail{display:none}
/* chat */
.chat{flex:1;min-height:0;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding-bottom:6px}
.brow{display:flex;flex-direction:column;max-width:84%}
.brow.me{align-self:flex-end;align-items:flex-end}.brow.cl{align-self:flex-start;align-items:flex-start}
.bub{padding:9px 12px;border-radius:14px;font-size:14px;white-space:pre-wrap;word-break:break-word}
.brow.me .bub{background:var(--b);color:#fff;border-bottom-right-radius:4px}
.brow.cl .bub{background:#fff;border:1px solid var(--line);border-bottom-left-radius:4px}
.bmeta{font-size:10px;color:var(--mut);margin-top:3px;display:flex;gap:8px;align-items:center}
.bmeta .a{cursor:pointer;color:var(--b)}
.composer{flex:0 0 auto;display:flex;gap:8px;padding-top:8px;align-items:flex-end;border-top:1px solid var(--line)}
.composer textarea{flex:1;min-height:46px;max-height:130px;border-radius:12px}
.composer .btn{height:46px;white-space:nowrap}
/* today */
.todo{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--line);border-radius:10px;padding:9px 11px;margin-bottom:7px;background:#fff}
.todo.done{opacity:.5}.todo.done .tt{text-decoration:line-through}
.todo .tcol{flex:1;min-width:0}
.todo .tt{font-weight:600;font-size:14px;line-height:1.35;word-break:break-word}
.todo .tmeta{font-size:11px;margin-top:2px;color:var(--mut)}
.todo .tmeta b{font-weight:800}
.todo .tmeta .kk{font-weight:800}.kk.cal{color:var(--b2)}.kk.job{color:#6b46c1}.kk.todo{color:#5a6b62}
.todo .acts{flex:0 0 auto;display:flex;gap:5px;align-items:center}
.st{padding:4px 9px;border-radius:999px;font-size:11px;font-weight:800;border:1px solid var(--line);background:#fff;color:#999;cursor:pointer}
.st.ing.on{background:#fdf3df;border-color:#f0d79b;color:var(--amber)}
.st.fin.on{background:#e7f6ee;border-color:#bfe3cf;color:var(--ok)}
.x{color:#c2cbc6;font-weight:800;cursor:pointer;font-size:15px;padding:0 3px}
/* calendar */
.cal-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal .dow{text-align:center;font-size:11px;color:var(--mut);font-weight:700;padding:4px 0}
.cal .cell{min-height:46px;border-radius:8px;padding:4px;font-size:12px;position:relative;background:#fff;border:1px solid #eef1f0;cursor:pointer;overflow:hidden}
.cal .cell.off{background:#f6f8fb;color:#c2cbc6}
.cal .cell.today{border-color:var(--b);background:var(--bl)}
.cal .cell.sel{outline:2px solid var(--b)}
.cal .cell .n{font-weight:700}
.cal .cell .mk{display:block;font-size:9px;line-height:1.25;color:var(--b2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.cal .cell.sun .n{color:#d2615b}.cal .cell.sat .n{color:#4d7bd6}
.ev{display:flex;gap:8px;align-items:flex-start;padding:9px 4px;border-bottom:1px solid #eef1f0}
.ev .ed{color:var(--b2);font-weight:800;font-size:12px;min-width:54px}
.ev .et{color:var(--mut);font-weight:700;font-size:12px;min-width:42px}
/* people (block, left-aligned) */
.ppl{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff}
.ppl .grp{font-weight:800;color:var(--b2);background:#eef3fe;padding:7px 11px;font-size:13px;border-top:1px solid var(--line)}
.ppl .grp:first-child{border-top:none}
.prow{border-top:1px solid #eef1f0;padding:9px 11px;position:relative}
.prow .delp{position:absolute;right:9px;top:9px;color:#c2cbc6;cursor:pointer;font-weight:800}
.prow .l1{display:flex;gap:8px;align-items:baseline;flex-wrap:wrap;padding-right:22px}
.prow .biz{color:var(--mut);font-size:11px}
.prow .nm{font-weight:800;font-size:14px}
.prow a.tel{color:var(--b);font-weight:700;text-decoration:none;font-size:13px}
.prow .goal{display:block;color:var(--goal);font-size:12.5px;font-weight:700;margin-top:3px;line-height:1.35}
.prow .pay{display:none;color:var(--amber);font-size:12px;font-weight:700;margin-top:2px}
.app.showpay .prow .pay{display:block}
/* order */
.oitem{border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px;background:#fff}
.oitem.done{opacity:.62}
.oitem .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.fb{background:#f4f7ff;border:1px solid #dbe7fd;border-radius:8px;padding:6px 9px;margin-top:6px;font-size:13px;white-space:pre-wrap}
.fb .ft{font-size:10px;color:var(--mut);display:block;margin-top:2px}
/* misc */
.empty{text-align:center;color:var(--mut);padding:26px 10px;font-size:13px}
.addbar{display:flex;gap:8px;margin-bottom:12px}
.seg{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.seg button{padding:6px 12px;border-radius:999px;border:1px solid var(--line);background:#fff;font-size:13px;font-weight:700;color:#566;cursor:pointer}
.seg button.on{background:var(--b);color:#fff;border-color:var(--b)}
.kpi{display:flex;gap:10px;margin:8px 0 12px}
.kpi .bx{flex:1;background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px}
.kpi .bx .l{font-size:12px;color:var(--mut)}.kpi .bx .v{font-size:22px;font-weight:800;margin-top:4px}
.kpi .bx.net .v{color:var(--b2)}
.seclbl{font-size:13px;font-weight:800;color:#3a4658;margin:12px 2px 8px}
.ssum{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:6px}
.ssum .ss{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 13px}
.ssum .ss .sl{font-size:12px;color:var(--mut);display:block}
.ssum .ss .sv{font-size:19px;font-weight:800;margin-top:4px;display:block;letter-spacing:-.3px}
.ssum .ss.net .sv{color:var(--b2)}
#salesBreak{display:grid;grid-template-columns:1fr;gap:9px}
.scard{background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px 13px}
.scard .sname{font-weight:800;font-size:14px;margin-bottom:8px;color:#26303f}
.smet{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.smet>div{display:flex;justify-content:space-between;align-items:baseline;background:#f6f8fc;border-radius:8px;padding:6px 10px}
.smet .sl{color:var(--mut);font-size:11.5px}
.smet .sv{font-weight:800;font-size:13.5px;letter-spacing:-.3px}
.smet .net .sv{color:var(--b2)}
nav button .ic svg{width:21px;height:21px;display:block}
.memo{white-space:pre-wrap;word-break:break-word}
.rowsb{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px;flex-wrap:wrap}
/* login */
#login{position:fixed;inset:0;background:linear-gradient(150deg,#2563eb,#1d4ed8);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;text-align:center;padding:30px}
#login h1{font-size:30px;font-weight:800;margin:0 0 6px}#login p{opacity:.9;margin:0 0 30px}
.gbtn{background:#fff;color:#222;border:none;border-radius:12px;padding:13px 22px;font-size:15px;font-weight:700;display:inline-flex;align-items:center;gap:10px;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.2)}
.gbtn img{width:20px;height:20px}
#loginMsg{margin-top:18px;font-size:13px;opacity:.95;min-height:18px}
.hide{display:none!important}
/* ===== desktop ===== */
@media(min-width:760px){
  body{background:#dfe4ee}
  .app{max-width:none;width:100%;margin:0;height:100vh;height:100dvh;flex-direction:row;align-items:stretch}
  header{display:none}
  nav{position:fixed;left:0;top:0;bottom:0;transform:none;width:210px;max-width:210px;flex-direction:column;border-top:none;border-right:1px solid var(--line);padding:0 12px 18px;gap:4px;justify-content:flex-start;background:linear-gradient(180deg,#1d4ed8,#2563eb)}
  nav::before{content:"다빈 보드";display:block;color:#fff;font-weight:800;font-size:19px;padding:22px 12px 18px}
  nav button{flex:0 0 auto;flex-direction:row;justify-content:flex-start;gap:12px;font-size:14px;padding:11px 14px;border-radius:10px;color:#dbe7fd}
  nav button .ic{font-size:18px}
  nav button:hover{background:rgba(255,255,255,.12);color:#fff}
  nav button.on{background:#fff;color:var(--b)}
  main{margin-left:210px;margin-right:280px;width:auto;flex:1;height:100vh;height:100dvh;min-width:0}
  .deskhead{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(120deg,#2563eb,#60a5fa);color:#fff;padding:18px 28px;flex:0 0 auto}
  .deskhead h2{margin:0;font-size:21px;font-weight:800}
  .deskhead .dw{font-size:12px;opacity:.9;cursor:pointer}
  .pagewrap{padding:22px 28px}
  .brow{max-width:62%}
  .kpi .bx .v{font-size:26px}
  .cal .cell{min-height:92px;padding:6px}
  .cal .cell .n{font-size:14px}
  .cal .cell .mk{font-size:11px;white-space:normal;line-height:1.3}
  #salesBreak{grid-template-columns:repeat(3,1fr)}
  .rrail{display:flex;flex-direction:column;position:fixed;right:0;top:0;bottom:0;width:280px;background:#fff;border-left:1px solid var(--line);z-index:25}
  .rrail .rh{background:linear-gradient(120deg,#0d8a5f,#22b07d);color:#fff;padding:18px 18px;font-weight:800;font-size:15px;flex:0 0 auto}
  .rrail .rb{flex:1;min-height:0;overflow-y:auto;padding:12px 14px}
  .ritem{border-left:3px solid var(--b);background:#f7f9fe;border-radius:8px;padding:7px 9px;margin-bottom:8px;font-size:12.5px}
  .ritem .rt{font-weight:700;color:var(--b2);font-size:11px}
  .ritem.ing{border-left-color:var(--amber);background:#fdf8ee}
}
@media(max-width:759px){.rrail{display:none!important}}
</style>
</head>
<body>
<div id="login">
  <h1>다빈 보드</h1><p>윤다빈 전용 · 로그인이 필요합니다</p>
  <button class="gbtn" onclick="doLogin()"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="">Google로 로그인</button>
  <div id="loginMsg"></div>
</div>
<div class="app hide" id="appRoot">
<header><h1 id="ttl">소통</h1><span class="who" onclick="doLogout()">로그아웃</span></header>
<main>
  <div class="deskhead"><h2 id="dttl">소통</h2><span class="dw" onclick="doLogout()">로그아웃</span></div>
  <div class="pagewrap">
  <section class="page on" id="p-talk">
    <div class="chat" id="chat"><div class="empty">불러오는 중…</div></div>
    <div class="composer"><textarea id="msg" rows="2" placeholder="메시지 입력 — 남겨두면 클로드가 확인해요"></textarea><button class="btn p" onclick="sendMsg()">전송</button></div>
  </section>
  <section class="page" id="p-today">
    <div class="rowsb"><h2 class="t" id="todayHd" style="margin:0">오늘</h2><div style="display:flex;gap:6px;align-items:center"><span class="muted small" id="prog"></span><button class="btn o sm" id="hideBtn" onclick="toggleHide()">완료 숨기기</button></div></div>
    <div id="todoList"><div class="empty">불러오는 중…</div></div>
    <div class="addbar"><input id="newTodo" placeholder="할 일 직접 추가"><button class="btn p" onclick="addTodo()">추가</button></div>
  </section>
  <section class="page" id="p-cal">
    <div class="cal-h"><button class="btn o sm" onclick="moveMonth(-1)">‹</button><strong id="calLabel"></strong><button class="btn o sm" onclick="moveMonth(1)">›</button></div>
    <div class="cal" id="calGrid"></div>
    <div class="rowsb" style="margin:16px 0 6px"><h3 id="monLabel" style="margin:0;font-size:15px"></h3><button class="btn o sm" onclick="showMonth()">📋 이번달 단발성</button></div>
    <div class="small muted" style="margin:0 2px 6px">단발성(특정일) 일정만 · 반복일정 제외</div>
    <div id="monEvents"></div>
  </section>
  <section class="page" id="p-people">
    <div class="rowsb"><h2 class="t" style="margin:0">인원관리</h2><div style="display:flex;gap:6px"><button class="btn o sm" id="goalBtn" onclick="toggleGoalOnly()">🎯 목표만</button><button class="btn o sm" id="payBtn" onclick="togglePay()">💰 급여 보기</button></div></div>
    <input id="pSearch" placeholder="검색 (이름·소속·사업자·연락처)" oninput="renderPeople()" style="margin-bottom:10px">
    <div class="ppl" id="peopleBody"><div class="empty">불러오는 중…</div></div>
    <details style="margin-top:12px"><summary class="muted small" style="cursor:pointer;padding:6px">+ 인원 직접 추가</summary>
    <div class="card" style="margin-top:8px"><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><input id="pBiz" placeholder="사업자"><input id="pTeam" placeholder="소속"><input id="pName" placeholder="이름"><input id="pTel" placeholder="연락처"></div><input id="pGoal" placeholder="목표(선택)" style="margin-top:8px"><input id="pPay" placeholder="월 급여(선택)" style="margin-top:8px"><button class="btn p" style="margin-top:10px;width:100%" onclick="addPerson()">추가</button></div></details>
  </section>
  <section class="page" id="p-order">
    <div class="rowsb"><h2 class="t" style="margin:0">오더사항</h2><button class="btn o sm" id="odoneBtn" onclick="toggleOrderDone()">완료내역 보기</button></div>
    <input id="oSearch" placeholder="검색 (대상·내용·피드백)" oninput="renderOrder()" style="margin-bottom:10px">
    <div id="orderList"><div class="empty">불러오는 중…</div></div>
    <div class="card"><label class="fl">대상 인원</label><input id="oWho" placeholder="누구에게"><label class="fl">오더 내용</label><textarea id="oWhat" rows="2" placeholder="지시 내용"></textarea><button class="btn p" style="margin-top:10px;width:100%" onclick="addOrder()">오더 등록</button></div>
  </section>
  <section class="page" id="p-proj">
    <h2 class="t">장기업무</h2>
    <div id="projList"><div class="empty">불러오는 중…</div></div>
    <div class="card"><label class="fl">제목</label><input id="jTitle" placeholder="프로젝트/사안 제목"><label class="fl">메모</label><textarea id="jMemo" rows="3" placeholder="상세/진행 메모 (줄바꿈 가능)"></textarea><button class="btn p" style="margin-top:10px;width:100%" onclick="addProj()">등록</button></div>
  </section>
  <section class="page" id="p-sales">
    <h2 class="t">매출 / 순익</h2>
    <div class="seg" id="segT"></div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px"><input type="date" id="d1"><span class="muted">~</span><input type="date" id="d2"><button class="btn o sm" onclick="customRange()">조회</button></div>
    <div class="seg" id="segP"></div>
    <div id="salesRange" class="muted small" style="margin:2px 2px 8px"></div>
    <div class="small" style="background:#fff7e6;border:1px solid #f0dca8;color:#9a6a12;border-radius:10px;padding:8px 10px;margin-bottom:12px">현재 샘플 데이터 · 실데이터 연동은 다음 단계</div>
    <div class="seclbl">전체 합산</div>
    <div id="salesSum"></div>
    <div class="seclbl">팀별</div>
    <div id="salesBreak"></div>
  </section>
  </div>
</main>
<div class="rrail" id="rrail"><div class="rh">📌 오늘 남은 업무</div><div class="rb" id="railBody"></div></div>
<nav id="nav"></nav>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
var firebaseConfig={apiKey:"AIzaSyDV_8R2w2YjINtcmTsxpG0AsLEpaTMRVkg",authDomain:"dabin-board.firebaseapp.com",projectId:"dabin-board",storageBucket:"dabin-board.firebasestorage.app",messagingSenderId:"161372753030",appId:"1:161372753030:web:30c4c881a5fb360bfc5507"};
var ALLOWED="foodkarshiva@gmail.com";
firebase.initializeApp(firebaseConfig);
var auth=firebase.auth(),db=firebase.firestore();
var unsub=[];
var IS_MOBILE=window.matchMedia('(max-width:759px)').matches||('ontouchstart' in window);
function doLogin(){var p=new firebase.auth.GoogleAuthProvider();auth.signInWithPopup(p).catch(function(e){document.getElementById('loginMsg').textContent='로그인 실패: '+e.message})}
function doLogout(){auth.signOut()}
auth.onAuthStateChanged(function(u){var login=document.getElementById('login'),app=document.getElementById('appRoot');if(u&&u.email===ALLOWED){login.classList.add('hide');app.classList.remove('hide');startApp()}else if(u){document.getElementById('loginMsg').textContent='허용되지 않은 계정('+u.email+')입니다.';auth.signOut()}else{login.classList.remove('hide');app.classList.add('hide');unsub.forEach(function(f){f&&f()});unsub=[]}});
function esc(s){return (s+'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]})}
function v(id){return document.getElementById(id).value.trim()}
function nowT(){var d=new Date();return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)}
function dstr(){var d=new Date();return (d.getMonth()+1)+'/'+d.getDate()+' '+nowT()}
function fmtWon(n){return Number(n).toLocaleString('ko-KR')}

function isBiz(d){var w=d.getDay();return w>=1&&w<=5&&!HOL[iso(d)]}
function firstBiz(y,m){var d=new Date(y,m,1);while(!isBiz(d))d.setDate(d.getDate()+1);return iso(d)}
function lastBiz(y,m){var d=new Date(y,m+1,0);while(!isBiz(d))d.setDate(d.getDate()-1);return iso(d)}
function recurringFor(dt){var s=iso(dt),w=dt.getDay(),out=[];WEEKLY.forEach(function(x){if(x.d.indexOf(w)>=0&&!WSKIP.some(function(k){return k.t===x.t&&k.date===s}))out.push({s:x.s,t:x.t})});if(s===firstBiz(dt.getFullYear(),dt.getMonth()))MF.forEach(function(x){out.push({s:x.s,t:x.t})});if(s===lastBiz(dt.getFullYear(),dt.getMonth()))ML.forEach(function(x){out.push({s:x.s,t:x.t})});return out}
function oneoffFor(dt){var s=iso(dt);return ONE.filter(function(o){return o.date===s}).map(function(o){return {s:o.allday?'종일':o.s,t:o.t,allday:o.allday}})}
function jobsFor(dt){var w=dt.getDay();return JOBS.filter(function(j){return j.sc==='d'||(j.sc==='wd'&&w>=1&&w<=5)||(Array.isArray(j.sc)&&j.sc.indexOf(w)>=0)}).map(function(j){return {s:j.s,t:j.t}})}

function renderCal(){document.getElementById('calLabel').textContent=calY+'년 '+(calM+1)+'월';var g=document.getElementById('calGrid'),h='';['일','월','화','수','목','금','토'].forEach(function(d){h+='<div class="dow">'+d+'</div>'});var first=new Date(calY,calM,1),start=new Date(first);start.setDate(1-first.getDay());for(var i=0;i<42;i++){var d=new Date(start);d.setDate(start.getDate()+i);var inM=d.getMonth()===calM,s=iso(d);var ev=oneoffFor(d);var cls=['cell'];if(!inM)cls.push('off');if(s===todayISO)cls.push('today');if(s===selDate)cls.push('sel');if(d.getDay()===0)cls.push('sun');if(d.getDay()===6)cls.push('sat');var mk='';for(var j=0;j<ev.length&&j<3;j++){mk+='<span class="mk">'+esc(ev[j].t)+'</span>'}if(ev.length>3)mk+='<span class="mk">+'+(ev.length-3)+'</span>';h+='<div class="'+cls.join(' ')+'" onclick="selDay(\''+s+'\')"><span class="n">'+d.getDate()+'</span>'+mk+'</div>'}g.innerHTML=h;renderMonList()}

function editProj(id){var p=PROJ.filter(function(x){return x.id===id})[0];if(!p)return;var box=document.getElementById('pj_'+id);box.innerHTML='<input id="ept_'+id+'" value="'+esc(p.title)+'" style="margin-bottom:8px"><textarea id="epm_'+id+'" rows="4">'+esc(p.memo||'')+'</textarea><div style="display:flex;gap:6px;margin-top:8px"><button class="btn p sm" onclick="saveProj(\''+id+'\')">저장</button><button class="btn o sm" onclick="renderProj()">취소</button></div>'}
function saveProj(id){var t=document.getElementById('ept_'+id).value.trim(),m=document.getElementById('epm_'+id).value;if(!t)return;db.collection('projects').doc(id).update({title:t,memo:m})}
function addProj(){var t=v('jTitle');if(!t)return;db.collection('projects').add({title:t,memo:document.getElementById('jMemo').value,tstr:dstr(),ts:Date.now()});document.getElementById('jTitle').value='';document.getElementById('jMemo').value=''}
function delDoc(col,id){db.collection(col).doc(id).delete()}
var SALES={channel:{name:'자체채널',items:{'1팀':[127000000,16900000],'2팀':[120000000,13000000],'3팀':[9000000,1100000],'4팀':[6000000,780000],'5팀':[5000000,600000]}},ext:{name:'외부유통',items:{'마덕':[127412500,11333816],'마찬':[83213300,10512670],'마경':[74406500,9211850],'마영':[12000000,1400000],'마황':[18000000,1600000],'마동':[9000000,900000],'마팩':[8000000,700000],'마우':[15000000,1500000]}},inner:{name:'내부유통',items:{'유통사→마스터':[40000000,4000000]}}};
var PERIODS=[['today','오늘'],['yest','어제'],['week','이번주'],['month','이번달'],['lmonth','지난달'],['year','올해']];
var curPer='today',curSrc='all';
function periodDays(id){var d=todayD;if(id==='week')return 7;if(id==='month')return d.getDate();if(id==='lmonth')return new Date(d.getFullYear(),d.getMonth(),0).getDate();if(id==='year')return Math.max(1,Math.round((d-new Date(d.getFullYear(),0,0))/86400000));return 1}
var segT=document.getElementById('segT');PERIODS.forEach(function(p){var b=document.createElement('button');b.textContent=p[1];b.dataset.id=p[0];b.onclick=function(){curPer=p[0];renderSales()};segT.appendChild(b)});
var segP=document.getElementById('segP');[['all','전체'],['channel','자체채널'],['ext','외부유통'],['inner','내부유통']].forEach(function(p){var b=document.createElement('button');b.textContent=p[1];b.dataset.id=p[0];b.onclick=function(){curSrc=p[0];renderSales()};segP.appendChild(b)});
function srcItems(){var out={};var keys=curSrc==='all'?['channel','ext','inner']:[curSrc];keys.forEach(function(k){var src=SALES[k];Object.keys(src.items).forEach(function(it){var label=curSrc==='all'?(src.name+' '+it):it;out[label]=src.items[it]})});return out}
function renderSales(){segT.querySelectorAll('button').forEach(function(b){b.classList.toggle('on',b.dataset.id===curPer)});segP.querySelectorAll('button').forEach(function(b){b.classList.toggle('on',b.dataset.id===curSrc)});var pf=PERIODS.filter(function(p){return p[0]===curPer})[0];var days=periodDays(curPer);var items=srcItems();var keys=Object.keys(items);var TR=0,TN=0,rows=[];keys.forEach(function(k){var dRev=items[k][0]/30,dNet=items[k][1]/30;var rev=Math.round(dRev*days),net=Math.round(dNet*days);TR+=rev;TN+=net;rows.push({k:k,rev:rev,arev:Math.round(dRev),net:net,anet:Math.round(dNet)})});var aTR=days?Math.round(TR/days):TR,aTN=days?Math.round(TN/days):TN;var srcName=curSrc==='all'?'전체':SALES[curSrc].name;document.getElementById('salesRange').textContent=srcName+' · '+pf[1]+' ('+days+'일 기준)';document.getElementById('salesSum').innerHTML='<div class="ssum"><div class="ss"><span class="sl">매출</span><span class="sv">'+fmtWon(TR)+'</span></div><div class="ss"><span class="sl">일평균매출</span><span class="sv">'+fmtWon(aTR)+'</span></div><div class="ss net"><span class="sl">순익</span><span class="sv">'+fmtWon(TN)+'</span></div><div class="ss net"><span class="sl">일평균순익</span><span class="sv">'+fmtWon(aTN)+'</span></div></div>';document.getElementById('salesBreak').innerHTML=rows.length?rows.map(function(r){return '<div class="scard"><div class="sname">'+esc(r.k)+'</div><div class="smet"><div><span class="sl">매출</span><span class="sv">'+fmtWon(r.rev)+'</span></div><div><span class="sl">일평균매출</span><span class="sv">'+fmtWon(r.arev)+'</span></div><div class="net"><span class="sl">순익</span><span class="sv">'+fmtWon(r.net)+'</span></div><div class="net"><span class="sl">일평균순익</span><span class="sv">'+fmtWon(r.anet)+'</span></div></div></div>'}).join(''):'<div class="empty">데이터 없음</div>'}
function customRange(){var a=v('d1'),b=v('d2');if(!a)return;segT.querySelectorAll('button').forEach(function(x){x.classList.remove('on')});document.getElementById('salesRange').textContent=(b?a+' ~ '+b:a)+' (지정조회 · 연동 후)';document.getElementById('salesSum').innerHTML='';document.getElementById('salesBreak').innerHTML='<div class="muted small">지정기간 실데이터는 연동 후 표시됩니다.</div>'}
var mEl=document.getElementById('msg');
mEl.addEventListener('input',function(){mEl.style.height='auto';mEl.style.height=Math.min(mEl.scrollHeight,130)+'px'});
if(!IS_MOBILE){mEl.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}})}
</script>
</body>
</html>
